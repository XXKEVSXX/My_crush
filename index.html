<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Crucial tag to ensure proper scaling on iPhones and mobile screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CodePen - Drag Papers 💜</title>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Short+Stack&amp;family=Homemade+Apple&amp;display=swap'>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="paper heart"></div>

  <div class="paper image">
    <p>and I fallen in</p>
    <p>Love with You 😍</p>
    <img src="IMG_1224.PNG" alt="Love Image 1" />
  </div>

  <!-- Fixed the unclosed <p> tag here -->
  <div class="paper image">
    <p></p>
    <img src="IMG_0535.JPG" alt="Love Image 2" />
  </div>

  <div class="paper image">
    <p>How can be</p>
    <p>someone so cute 💜</p>
    <img src="UQQD1471.JPG" alt="Love Image 3" />
  </div>

  <div class="paper red">
    <p class="p1">and My Favorite</p>
    <p class="p2">Person 😍</p>
    <img src="IMG_0816.JPG" alt="Favorite Person" />
  </div>

  <div class="paper">
    <p class="p1">You are Cute</p>
    <p class="p1">Amazing <span style="color: purple !important;">💜</span></p>
  </div>

  <div class="paper">
    <p class="p1">Drag the papers to move!</p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
